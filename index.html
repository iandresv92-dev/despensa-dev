<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="translucent-black" />
<title>Despensa</title>
<style>
  :root{
    --bg: #F2F1F7;
    --surface: rgba(255,255,255,0.55);
    --surface-strong: rgba(255,255,255,0.78);
    --border: rgba(255,255,255,0.6);
    --text: #2D2A3D;
    --text-soft: #6E6A85;
    --text-faint: #9D99B3;
    --lavender: #C9C2F0;
    --lavender-deep: #9B8FE0;
    --mint: #A8E6CF;
    --mint-deep: #4FB88C;
    --peach: #FFD3A5;
    --peach-deep: #E8923F;
    --coral: #FF9AA2;
    --coral-deep: #E8525C;
    --sky: #A8D8EA;
    --sky-deep: #4F9AC0;
    --shadow: 0 8px 32px rgba(110, 100, 150, 0.14);
    --shadow-soft: 0 4px 16px rgba(110, 100, 150, 0.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh; position:relative;}

  .blob{
    position:fixed;
    border-radius:50%;
    filter: blur(60px);
    opacity:0.55;
    z-index:0;
    pointer-events:none;
  }
  .blob1{ width:280px; height:280px; background: var(--lavender); top:-80px; left:-60px; }
  .blob2{ width:240px; height:240px; background: var(--mint); top:200px; right:-90px; }
  .blob3{ width:260px; height:260px; background: var(--peach); bottom:60px; left:-100px; }
  .blob4{ width:200px; height:200px; background: var(--sky); bottom:-60px; right:-40px; }

  .app{ position:relative; z-index:1; max-width:520px; margin:0 auto; min-height:100vh; padding-bottom:96px; }

  .topbar{
    position:sticky; top:0; z-index:20;
    padding: max(18px, env(safe-area-inset-top)) 20px 14px;
    background: rgba(242,241,247,0.72);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border-bottom: 1px solid rgba(255,255,255,0.5);
  }
  .topbar h1{ font-size:26px; font-weight:700; margin:0; letter-spacing:-0.02em; }
  .topbar .sub{ font-size:13px; color:var(--text-soft); margin-top:2px; }

  .content{ padding: 18px 16px 8px; }

  .glass{
    background: var(--surface);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow-soft);
  }
  .glass-strong{
    background: var(--surface-strong);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 26px;
    box-shadow: var(--shadow);
  }

  /* Dashboard stat cards */
  .stats-row{ display:flex; gap:10px; margin-bottom:16px; }
  .stat-card{
    flex:1; padding:14px 12px; text-align:left;
    display:flex; flex-direction:column; gap:6px;
  }
  .stat-num{ font-size:28px; font-weight:700; letter-spacing:-0.02em; font-variant-numeric: tabular-nums; }
  .stat-label{ font-size:11.5px; color:var(--text-soft); font-weight:500; }
  .stat-card.coral .stat-num{ color: var(--coral-deep); }
  .stat-card.peach .stat-num{ color: var(--peach-deep); }
  .stat-card.mint .stat-num{ color: var(--mint-deep); }

  .section-title{
    font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    color: var(--text-faint); margin: 22px 4px 10px;
  }
  .section-title.first{ margin-top:4px; }

  /* Lot / product cards */
  .lot-card{
    position:relative;
    padding:14px 16px 14px 18px;
    margin-bottom:10px;
    display:flex; align-items:center; gap:12px;
    overflow:hidden;
  }
  .lot-card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:5px;
    background: var(--accent, var(--mint-deep));
  }
  .lot-info{ flex:1; min-width:0; }
  .lot-name{ font-size:16px; font-weight:600; margin:0 0 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lot-meta{ font-size:12.5px; color:var(--text-soft); display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .lot-meta .dot{ width:3px; height:3px; border-radius:50%; background:var(--text-faint); }
  .lot-badge{
    font-size:11px; font-weight:700; padding:4px 9px; border-radius:99px;
    color:#fff; white-space:nowrap;
  }
  .lot-qty{ font-size:13px; color:var(--text-soft); font-weight:600; font-variant-numeric: tabular-nums; }
  .progress-track{ height:4px; background:rgba(0,0,0,0.06); border-radius:99px; margin-top:8px; overflow:hidden; }
  .progress-fill{ height:100%; border-radius:99px; background: var(--accent, var(--mint-deep)); }

  .product-card{
    padding:14px 16px;
    margin-bottom:10px;
    display:flex; align-items:center; gap:12px;
    cursor:pointer;
  }
  .product-card:active{ transform: scale(0.985); }
  .product-emoji{
    width:42px; height:42px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
    background: var(--chip-bg, var(--lavender));
  }
  .product-name{ font-size:15.5px; font-weight:600; margin:0 0 2px; }
  .product-meta{ font-size:12.5px; color:var(--text-soft); }
  .product-right{ text-align:right; flex-shrink:0; }
  .product-total{ font-size:15px; font-weight:700; font-variant-numeric: tabular-nums; }
  .chev{ color: var(--text-faint); font-size:18px; margin-left:2px; }

  /* Buttons */
  .btn{
    border:none; cursor:pointer; font-family:inherit;
    font-size:15px; font-weight:600; border-radius:16px;
    padding:13px 18px; display:flex; align-items:center; justify-content:center; gap:8px;
    transition: transform 0.12s ease, opacity 0.12s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: linear-gradient(135deg, var(--lavender-deep), var(--lavender)); color:#fff; box-shadow: 0 6px 16px rgba(155,143,224,0.4); }
  .btn-soft{ background: var(--surface-strong); color: var(--text); border:1px solid var(--border); }
  .btn-danger-soft{ background: rgba(255,154,162,0.25); color: var(--coral-deep); border:1px solid rgba(255,154,162,0.4); }
  .btn-block{ width:100%; }
  .btn-sm{ padding:9px 14px; font-size:13.5px; border-radius:12px; }

  .fab{
    position:fixed; right:20px; bottom:96px; z-index:30;
    width:58px; height:58px; border-radius:50%;
    background: linear-gradient(135deg, var(--lavender-deep), #B6A8F0);
    color:#fff; font-size:28px; font-weight:400;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 10px 24px rgba(155,143,224,0.5);
    border:none; cursor:pointer;
  }
  .fab:active{ transform: scale(0.93); }

  /* Tab bar */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:25;
    display:flex; justify-content:center;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tabbar-inner{
    width:100%; max-width:520px; display:flex;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-top: 1px solid rgba(255,255,255,0.6);
    padding: 8px 6px max(8px, env(safe-area-inset-bottom)) 6px;
  }
  .tab-btn{
    flex:1; background:none; border:none; cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:7px 2px 5px; color: var(--text-faint); font-size:10.5px; font-weight:600;
    border-radius:14px;
  }
  .tab-btn.active{ color: var(--lavender-deep); }
  .tab-icon{ font-size:21px; line-height:1; }

  /* Inputs */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--text-soft); margin-bottom:6px; }
  .field input, .field select, .field textarea{
    width:100%; font-family:inherit; font-size:15.5px; color:var(--text);
    padding:12px 14px; border-radius:14px;
    border:1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.75);
    outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    border-color: var(--lavender-deep);
    box-shadow: 0 0 0 3px rgba(155,143,224,0.18);
  }
  .seg{ display:flex; gap:8px; flex-wrap:wrap; }
  .seg-btn{
    padding:9px 14px; border-radius:13px; font-size:13.5px; font-weight:600;
    border:1px solid rgba(0,0,0,0.08); background:rgba(255,255,255,0.6); color:var(--text-soft);
    cursor:pointer; font-family:inherit;
  }
  .seg-btn.active{ background: var(--lavender-deep); color:#fff; border-color:var(--lavender-deep); }

  /* Modal / sheet */
  .overlay{
    position:fixed; inset:0; z-index:50;
    background: rgba(45,42,61,0.35);
    backdrop-filter: blur(2px);
    display:flex; align-items:flex-end; justify-content:center;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .sheet{
    width:100%; max-width:520px; max-height:88vh; overflow-y:auto;
    background: rgba(248,247,252,0.92);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border-radius: 28px 28px 0 0;
    padding: 10px 20px max(20px, env(safe-area-inset-bottom));
    border-top:1px solid rgba(255,255,255,0.7);
    animation: slideUp 0.22s cubic-bezier(.25,.8,.25,1);
  }
  @keyframes slideUp{ from{transform:translateY(40px); opacity:0.6} to{transform:translateY(0); opacity:1} }
  .sheet-handle{ width:38px; height:4px; border-radius:99px; background:rgba(0,0,0,0.15); margin: 6px auto 14px; }
  .sheet-title{ font-size:19px; font-weight:700; margin:0 0 16px; }

  .empty-state{ text-align:center; padding: 50px 24px; color: var(--text-faint); }
  .empty-state .emoji{ font-size:40px; margin-bottom:10px; }
  .empty-state p{ font-size:14px; margin:0; line-height:1.5; }

  .search-bar{
    display:flex; align-items:center; gap:8px;
    padding:11px 14px; margin-bottom:14px;
  }
  .search-bar input{
    flex:1; border:none; background:none; outline:none; font-size:15px; font-family:inherit; color:var(--text);
  }
  .filter-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar{ display:none; }
  .filter-chip{
    flex-shrink:0; padding:8px 14px; border-radius:99px; font-size:12.5px; font-weight:600;
    background: rgba(255,255,255,0.6); border:1px solid rgba(0,0,0,0.06); color:var(--text-soft);
    cursor:pointer; white-space:nowrap;
  }
  .filter-chip.active{ background: var(--text); color:#fff; }

  .toast{
    position:fixed; bottom:170px; left:50%; transform:translateX(-50%); z-index:60;
    background: rgba(45,42,61,0.92); color:#fff; padding:12px 20px; border-radius:14px;
    font-size:14px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.25);
    animation: toastIn 0.25s ease;
    max-width: 85%; text-align:center;
  }
  @keyframes toastIn{ from{opacity:0; transform:translate(-50%,10px)} to{opacity:1; transform:translate(-50%,0)} }

  .row-between{ display:flex; align-items:center; justify-content:space-between; }
  .icon-btn{
    background:rgba(0,0,0,0.05); border:none; width:34px; height:34px; border-radius:11px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; color:var(--text-soft);
  }
  .cat-pill{
    display:inline-flex; align-items:center; gap:6px; padding:10px 14px; border-radius:16px;
    margin-bottom:8px; width:100%;
  }
  .lot-pick{
    width:100%; text-align:left; padding:14px; border-radius:16px; margin-bottom:10px;
    border:1.5px solid rgba(0,0,0,0.07); background:rgba(255,255,255,0.6); cursor:pointer; font-family:inherit;
  }
  .lot-pick.suggested{ border-color: var(--lavender-deep); background: rgba(201,194,240,0.18); }
  .lot-pick .lp-top{ display:flex; justify-content:space-between; align-items:center; }
  .lot-pick .lp-name{ font-weight:700; font-size:14.5px; }
  .lot-pick .lp-sub{ font-size:12px; color:var(--text-soft); margin-top:3px; }
  .tag-suggest{ font-size:10px; font-weight:700; color:var(--lavender-deep); background:rgba(201,194,240,0.3); padding:2px 8px; border-radius:99px; }

  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{
    width:40px; height:40px; border-radius:13px; border:none; background:rgba(0,0,0,0.06);
    font-size:19px; font-weight:600; color:var(--text); cursor:pointer;
  }
  .stepper input{ width:60px; text-align:center; font-size:18px; font-weight:700; padding:10px 4px; }

  .report-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
  .report-row:last-child{ border-bottom:none; }
  .report-rank{ width:22px; font-size:12px; font-weight:700; color:var(--text-faint); }
  .report-bar-bg{ height:6px; background:rgba(0,0,0,0.06); border-radius:99px; margin-top:5px; overflow:hidden; }
  .report-bar-fill{ height:100%; background: linear-gradient(90deg, var(--lavender-deep), var(--sky-deep)); border-radius:99px; }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';

// ---------- Helpers ----------
const STORAGE_KEY = 'despensa_v1';
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

const todayISO = () => new Date().toISOString().slice(0,10);
const daysBetween = (dateStr) => {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - today) / 86400000);
};
const fmtDate = (dateStr) => {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
};
const esc = (str) => String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const LOCATIONS = [
  { id:'despensa', label:'Despensa', emoji:'🗄️' },
  { id:'refrigerador', label:'Refrigerador', emoji:'❄️' },
  { id:'congelador', label:'Congelador', emoji:'🧊' },
];

const DEFAULT_CATEGORIES = [
  { id:'lacteos', name:'Lácteos', emoji:'🥛', color:'sky' },
  { id:'enlatados', name:'Enlatados', emoji:'🥫', color:'peach' },
  { id:'snacks', name:'Snacks', emoji:'🍪', color:'lavender' },
  { id:'limpieza', name:'Limpieza', emoji:'🧴', color:'mint' },
  { id:'otros', name:'Otros', emoji:'📦', color:'lavender' },
];

const COLOR_MAP = {
  lavender: { bg:'var(--lavender)', deep:'var(--lavender-deep)' },
  mint: { bg:'var(--mint)', deep:'var(--mint-deep)' },
  peach: { bg:'var(--peach)', deep:'var(--peach-deep)' },
  sky: { bg:'var(--sky)', deep:'var(--sky-deep)' },
  coral: { bg:'var(--coral)', deep:'var(--coral-deep)' },
};

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { products: [], categories: DEFAULT_CATEGORIES, consumption: [] };
}
function saveData(data){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
}

function lotStatus(lot, alertDays){
  const d = daysBetween(lot.expiry);
  if(d < 0) return 'expired';
  if(d <= alertDays) return 'warning';
  return 'ok';
}
const STATUS_COLOR = { ok:'mint', warning:'peach', expired:'coral' };
const STATUS_LABEL = { ok:'Vigente', warning:'Por vencer', expired:'Vencido' };

// ---------- Global state ----------
let state = {
  data: loadData(),
  tab: 'home',
  sheet: null, // {type, payload}
  toastMsg: null,
  toastTimer: null,
  inventoryFilters: { query:'', cat:'all', loc:'all', status:'all' },
  reportPeriod: 30,
  consumeDraft: { lotId: null, amount: 1 },
};

function setState(patch){
  Object.assign(state, patch);
  render();
}
function setData(updater){
  state.data = typeof updater === 'function' ? updater(state.data) : updater;
  saveData(state.data);
  render();
}
function showToast(msg){
  clearTimeout(state.toastTimer);
  state.toastMsg = msg;
  render();
  state.toastTimer = setTimeout(() => { state.toastMsg = null; render(); }, 2200);
}

// ---------- CRUD ----------
function addProduct(prod){
  setData(d => ({ ...d, products: [...d.products, prod] }));
}
function updateProduct(id, patch){
  setData(d => ({ ...d, products: d.products.map(p => p.id === id ? { ...p, ...patch } : p) }));
}
function deleteProduct(id){
  setData(d => ({ ...d, products: d.products.filter(p => p.id !== id) }));
}
function addLot(productId, lot){
  setData(d => ({
    ...d,
    products: d.products.map(p => p.id === productId ? { ...p, lots: [...(p.lots||[]), lot] } : p)
  }));
}
function consumeLot(productId, lotId, amount){
  setData(d => {
    const products = d.products.map(p => {
      if(p.id !== productId) return p;
      const lots = p.lots.map(l => l.id === lotId ? { ...l, qty: Math.max(0, l.qty - amount) } : l);
      return { ...p, lots };
    });
    const product = products.find(p => p.id === productId);
    const lot = product.lots.find(l => l.id === lotId);
    const record = {
      id: uid(), productId, productName: product.name,
      lotId, expiry: lot.expiry, amount, date: new Date().toISOString(),
    };
    return { ...d, products, consumption: [record, ...d.consumption] };
  });
}
function addCategory(cat){
  setData(d => ({ ...d, categories: [...d.categories, cat] }));
}
function updateCategory(id, patch){
  setData(d => ({ ...d, categories: d.categories.map(c => c.id === id ? { ...c, ...patch } : c) }));
}
function deleteCategory(id){
  setData(d => ({ ...d, categories: d.categories.filter(c => c.id !== id) }));
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `despensa-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Inventario exportado ✅');
}
function importJSON(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed.products || !parsed.categories) throw new Error('formato inválido');
      state.data = { products: parsed.products, categories: parsed.categories, consumption: parsed.consumption || [] };
      saveData(state.data);
      showToast('Inventario importado ✅');
      render();
    }catch(err){
      showToast('No se pudo leer el archivo ⚠️');
    }
  };
  reader.readAsText(file);
}

// ---------- Derived data ----------
function getAllLots(){
  const out = [];
  state.data.products.forEach(p => {
    (p.lots || []).forEach(l => {
      if(l.qty > 0) out.push({ ...l, product: p, status: lotStatus(l, p.alertDays ?? 3) });
    });
  });
  return out;
}

// ---------- Render: Topbar ----------
function renderTopbar(){
  const titles = { home:'Mi Despensa', inventory:'Inventario', reports:'Reportes', categories:'Categorías' };
  const dateStr = new Date().toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long' });
  return `
    <div class="topbar">
      <div class="row-between">
        <div>
          <h1>${titles[state.tab]}</h1>
          <div class="sub">${esc(dateStr)}</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="icon-btn" id="btn-import" title="Importar">⬇️</button>
          <button class="icon-btn" id="btn-export" title="Exportar">⬆️</button>
        </div>
      </div>
    </div>
    <input type="file" accept="application/json" id="file-input" style="display:none" />
  `;
}

// ---------- Render: Tab bar ----------
function renderTabBar(){
  const items = [
    { id:'home', icon:'🏠', label:'Inicio' },
    { id:'inventory', icon:'🧺', label:'Inventario' },
    { id:'reports', icon:'📊', label:'Reportes' },
    { id:'categories', icon:'🏷️', label:'Categorías' },
  ];
  return `
    <div class="tabbar">
      <div class="tabbar-inner glass-strong" style="border-radius:24px 24px 0 0;">
        ${items.map(it => `
          <button class="tab-btn ${state.tab===it.id?'active':''}" data-tab="${it.id}">
            <span class="tab-icon">${it.icon}</span>
            <span>${it.label}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

// ---------- Render: Lot row (home) ----------
function renderLotRow(lot){
  const color = COLOR_MAP[STATUS_COLOR[lot.status]];
  const d = daysBetween(lot.expiry);
  const dayLabel = d < 0 ? `Venció hace ${Math.abs(d)} día${Math.abs(d)===1?'':'s'}` : d === 0 ? 'Vence hoy' : `Vence en ${d} día${d===1?'':'s'}`;
  return `
    <div class="glass lot-card" style="--accent:${color.deep}" data-open-product="${lot.product.id}">
      <div class="lot-info">
        <p class="lot-name">${esc(lot.product.name)}</p>
        <div class="lot-meta">
          <span>${dayLabel}</span><span class="dot"></span><span>${fmtDate(lot.expiry)}</span>
          <span class="dot"></span><span>${lot.qty} ${esc(lot.product.unit || 'un.')}</span>
        </div>
      </div>
      <span class="lot-badge" style="background:${color.deep}">${STATUS_LABEL[lot.status]}</span>
    </div>
  `;
}

// ---------- Render: Home Tab ----------
function renderHome(){
  const allLots = getAllLots();
  const warningLots = allLots.filter(l => l.status === 'warning').sort((a,b)=>daysBetween(a.expiry)-daysBetween(b.expiry));
  const expiredLots = allLots.filter(l => l.status === 'expired').sort((a,b)=>daysBetween(a.expiry)-daysBetween(b.expiry));
  const okCount = allLots.filter(l => l.status === 'ok').length;

  let html = `
    <div class="stats-row">
      <div class="glass stat-card mint"><div class="stat-num">${okCount}</div><div class="stat-label">Vigentes</div></div>
      <div class="glass stat-card peach"><div class="stat-num">${warningLots.length}</div><div class="stat-label">Por vencer</div></div>
      <div class="glass stat-card coral"><div class="stat-num">${expiredLots.length}</div><div class="stat-label">Vencidos</div></div>
    </div>
  `;

  if(expiredLots.length > 0){
    html += `<div class="section-title first">Vencidos</div>`;
    html += expiredLots.map(renderLotRow).join('');
  }

  html += `<div class="section-title" style="margin-top:${expiredLots.length?22:4}px">Por vencer pronto</div>`;
  if(warningLots.length === 0){
    html += `<div class="glass empty-state"><div class="emoji">✨</div><p>Nada por vencer en los próximos días.<br/>Tu despensa está bajo control.</p></div>`;
  } else {
    html += warningLots.map(renderLotRow).join('');
  }
  return html;
}

// ---------- Render: Inventory Tab ----------
function renderInventory(){
  const f = state.inventoryFilters;
  const products = state.data.products;
  const categories = state.data.categories;

  const enriched = products.map(p => {
    const lots = (p.lots||[]).filter(l => l.qty > 0);
    const total = lots.reduce((s,l) => s + l.qty, 0);
    const sorted = [...lots].sort((a,b) => daysBetween(a.expiry) - daysBetween(b.expiry));
    const nextLot = sorted[0] || null;
    const worstStatus = lots.reduce((worst, l) => {
      const s = lotStatus(l, p.alertDays ?? 3);
      const rank = { ok:0, warning:1, expired:2 };
      return rank[s] > rank[worst] ? s : worst;
    }, 'ok');
    return { ...p, total, nextLot, worstStatus, lotsCount: lots.length };
  });

  const filtered = enriched.filter(p => {
    if(f.query && !p.name.toLowerCase().includes(f.query.toLowerCase())) return false;
    if(f.cat !== 'all' && p.categoryId !== f.cat) return false;
    if(f.loc !== 'all' && p.locationId !== f.loc) return false;
    if(f.status !== 'all' && p.worstStatus !== f.status) return false;
    return true;
  });

  let html = `
    <div class="glass search-bar">
      <span style="font-size:16px;">🔍</span>
      <input placeholder="Buscar producto..." id="search-input" value="${esc(f.query)}" />
      ${f.query ? `<button class="icon-btn" style="width:26px;height:26px;" id="clear-search">✕</button>` : ''}
    </div>

    <div class="filter-row">
      <div class="filter-chip ${f.status==='all'?'active':''}" data-status="all">Todos</div>
      <div class="filter-chip ${f.status==='warning'?'active':''}" data-status="warning">Por vencer</div>
      <div class="filter-chip ${f.status==='expired'?'active':''}" data-status="expired">Vencidos</div>
      <div class="filter-chip ${f.loc!=='all'?'active':''}">
        <select id="filter-loc" style="background:none; border:none; color:inherit; font-weight:600; font-size:12.5px; font-family:inherit;">
          <option value="all" ${f.loc==='all'?'selected':''}>📍 Lugar</option>
          ${LOCATIONS.map(l => `<option value="${l.id}" ${f.loc===l.id?'selected':''}>${l.emoji} ${l.label}</option>`).join('')}
        </select>
      </div>
      <div class="filter-chip ${f.cat!=='all'?'active':''}">
        <select id="filter-cat" style="background:none; border:none; color:inherit; font-weight:600; font-size:12.5px; font-family:inherit;">
          <option value="all" ${f.cat==='all'?'selected':''}>🏷️ Categoría</option>
          ${categories.map(c => `<option value="${c.id}" ${f.cat===c.id?'selected':''}>${c.emoji} ${esc(c.name)}</option>`).join('')}
        </select>
      </div>
    </div>
  `;

  if(filtered.length === 0){
    const msg = products.length === 0 ? 'Aún no agregas productos.<br/>Toca el botón + para empezar.' : 'No encontramos productos con ese filtro.';
    html += `<div class="glass empty-state"><div class="emoji">🔎</div><p>${msg}</p></div>`;
  } else {
    html += filtered.map(p => {
      const cat = categories.find(c => c.id === p.categoryId);
      const loc = LOCATIONS.find(l => l.id === p.locationId);
      const color = COLOR_MAP[cat?.color || 'lavender'];
      return `
        <div class="glass product-card" data-open-product="${p.id}">
          <div class="product-emoji" style="--chip-bg:${color.bg}">${cat?.emoji || '📦'}</div>
          <div style="flex:1; min-width:0;">
            <p class="product-name">${esc(p.name)}</p>
            <div class="product-meta">
              ${loc?.emoji||''} ${esc(loc?.label||'')} · ${p.lotsCount} lote${p.lotsCount===1?'':'s'}
              ${p.nextLot ? ` · vence ${fmtDate(p.nextLot.expiry)}` : ''}
            </div>
          </div>
          <div class="product-right">
            <div class="product-total">${p.total} <span style="font-size:11px; font-weight:500; color:var(--text-soft);">${esc(p.unit||'un.')}</span></div>
            ${p.worstStatus !== 'ok' ? `<span class="lot-badge" style="background:${COLOR_MAP[STATUS_COLOR[p.worstStatus]].deep}; font-size:9.5px; padding:2px 7px;">${STATUS_LABEL[p.worstStatus]}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }
  return html;
}

// ---------- Render: Reports Tab ----------
function renderReports(){
  const period = state.reportPeriod;
  const cutoff = Date.now() - period * 86400000;
  const filtered = state.data.consumption.filter(c => new Date(c.date).getTime() >= cutoff);

  const map = {};
  filtered.forEach(c => {
    if(!map[c.productName]) map[c.productName] = { name: c.productName, total: 0, count: 0 };
    map[c.productName].total += c.amount;
    map[c.productName].count += 1;
  });
  const grouped = Object.values(map).sort((a,b) => b.total - a.total);
  const maxTotal = grouped[0]?.total || 1;

  let html = `
    <div class="glass" style="padding:14px; margin-bottom:18px;">
      <div class="section-title first" style="margin-top:0; margin-left:0;">Periodo</div>
      <div class="seg">
        ${[7,15,30,90].map(p => `<button class="seg-btn ${period===p?'active':''}" data-period="${p}">${p===90?'3 meses':`${p} días`}</button>`).join('')}
      </div>
    </div>
  `;

  if(grouped.length === 0){
    html += `<div class="glass empty-state"><div class="emoji">📭</div><p>Sin consumo registrado en este periodo.<br/>Descuenta stock desde el detalle de un producto.</p></div>`;
  } else {
    html += `<div class="glass-strong" style="padding:8px 18px 18px;"><div class="section-title first">Sugerido para reponer</div>`;
    html += grouped.map((g, i) => `
      <div class="report-row">
        <div style="display:flex; align-items:flex-start; gap:10px; flex:1;">
          <span class="report-rank">${i+1}</span>
          <div style="flex:1;">
            <div style="font-weight:600; font-size:14.5px;">${esc(g.name)}</div>
            <div style="font-size:11.5px; color:var(--text-soft);">${g.count} consumo${g.count===1?'':'s'} registrado${g.count===1?'':'s'}</div>
            <div class="report-bar-bg"><div class="report-bar-fill" style="width:${(g.total/maxTotal)*100}%"></div></div>
          </div>
        </div>
        <div style="font-weight:700; font-size:15px; margin-left:10px; font-variant-numeric:tabular-nums;">${g.total}</div>
      </div>
    `).join('');
    html += `</div>`;
  }
  return html;
}

function renderProductDetailSheet(){
  const product = state.data.products.find(p => p.id === state.sheet.payload.id);
  if(!product){ state.sheet = null; return ''; }
  const mode = state.detailMode || 'view';
  const categories = state.data.categories;
  const cat = categories.find(c => c.id === product.categoryId);
  const loc = LOCATIONS.find(l => l.id === product.locationId);
  const activeLots = (product.lots||[]).filter(l => l.qty > 0).sort((a,b)=>daysBetween(a.expiry)-daysBetween(b.expiry));
  const total = activeLots.reduce((s,l)=>s+l.qty,0);

  if(mode === 'addLot'){
    const draft = state.lotDraft || { qty:1, expiry:'' };
    state.lotDraft = draft;
    const valid = draft.qty > 0 && draft.expiry;
    return renderSheetWrapper(`Agregar stock · ${esc(product.name)}`, `
      <div class="field">
        <label>Cantidad</label>
        <div class="stepper">
          <button id="al-minus">−</button>
          <input type="number" id="al-qty" value="${draft.qty}" />
          <button id="al-plus">+</button>
          <span style="color:var(--text-soft); font-weight:600;">${esc(product.unit)}</span>
        </div>
      </div>
      <div class="field">
        <label>Fecha de vencimiento de este lote</label>
        <input type="date" id="al-expiry" value="${draft.expiry}" autofocus />
      </div>
      <button class="btn btn-primary btn-block" id="al-save" ${valid?'':'disabled'} style="opacity:${valid?1:0.5}">Agregar lote</button>
    `);
  }

  if(mode === 'consume'){
    const draft = state.consumeDraft;
    if(!draft.lotId && activeLots[0]) draft.lotId = activeLots[0].id;
    const current = activeLots.find(l => l.id === draft.lotId);
    const maxAmount = current?.qty || 1;

    if(activeLots.length === 1){
      const lot = activeLots[0];
      return renderSheetWrapper(`Descontar · ${esc(product.name)}`, `
        <p style="font-size:13.5px; color:var(--text-soft); margin-top:-8px; margin-bottom:16px;">

        <div class="field">
          <label>Cantidad a descontar</label>
          <div class="stepper">
            <button id="cs-minus">−</button>
            <input type="number" id="cs-amount" value="${draft.amount}" min="1" max="${lot.qty}" />
            <button id="cs-plus">+</button>
            <span style="color:var(--text-soft); font-weight:600;">${esc(product.unit)}</span>
          </div>
        </div>
        <button class="btn btn-primary btn-block" id="cs-confirm" data-lot="${lot.id}">Confirmar descuento</button>
      `);
    }

    return renderSheetWrapper(`Descontar · ${esc(product.name)}`, `
      <p style="font-size:13.5px; color:var(--text-soft); margin-top:-8px; margin-bottom:14px;">
        Este producto tiene varios lotes. Elige de cuál estás descontando — sugerimos el que vence antes (FEFO).
      </p>
      ${activeLots.map((l,i) => {
        const d = daysBetween(l.expiry);
        const isSel = draft.lotId === l.id;
        return `
          <button class="lot-pick ${isSel?'suggested':''}" data-pick-lot="${l.id}">
            <div class="lp-top">
              <span class="lp-name">${fmtDate(l.expiry)} ${i===0?'<span class="tag-suggest">SUGERIDO</span>':''}</span>
              <span style="font-weight:700;">${l.qty} ${esc(product.unit)}</span>

      <span class="lot-badge" style="background:var(--lavender-deep);">${cat?.emoji||''} ${esc(cat?.name||'')}</span>

      <span class="lot-badge" style="background:var(--text-faint);">Total: ${total} ${esc(product.unit)}</span>

// ---------- Master render ----------
function render(){
  const root = document.getElementById('root');
  const contentRenderers = { home: renderHome, inventory: renderInventory, reports: renderReports, categories: renderCategories };

  root.innerHTML = `
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <div class="app">
      ${renderTopbar()}
      <div class="content">${contentRenderers[state.tab]()}</div>
      <button class="fab" id="fab-add">+</button>
      ${renderTabBar()}
    </div>
    ${renderSheet()}
    ${state.toastMsg ? `<div class="toast">${esc(state.toastMsg)}</div>` : ''}
  `;

  attachEvents();
}

// ---------- Event delegation ----------
function attachEvents(){
  const root = document.getElementById('root');

  // Tab bar
  root.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => setState({ tab: btn.dataset.tab }));
  });

  // Topbar import/export
  const fileInput = document.getElementById('file-input');
  const btnImport = document.getElementById('btn-import');
  const btnExport = document.getElementById('btn-export');
  if(btnImport) btnImport.addEventListener('click', () => fileInput.click());
  if(btnExport) btnExport.addEventListener('click', exportJSON);
  if(fileInput) fileInput.addEventListener('change', (e) => {
    if(e.target.files[0]) importJSON(e.target.files[0]);
    e.target.value = '';
  });

  // FAB
  const fab = document.getElementById('fab-add');
  if(fab) fab.addEventListener('click', () => {
    state.productDraft = null;
    setState({ sheet: { type:'productForm', payload:null } });
  });

  // Open product cards
  root.querySelectorAll('[data-open-product]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.openProduct;
      const product = state.data.products.find(p => p.id === id);
      if(product){ state.detailMode = 'view'; setState({ sheet:{ type:'productDetail', payload:product } }); }
    });
  });

  // ---- Inventory tab ----
  const searchInput = document.getElementById('search-input');
  if(searchInput){
    searchInput.addEventListener('input', (e) => {
      state.inventoryFilters.query = e.target.value;
      render();
      // restore focus + cursor position
      const ni = document.getElementById('search-input');
      if(ni){ ni.focus(); ni.setSelectionRange(ni.value.length, ni.value.length); }
    });
  }
  const clearSearch = document.getElementById('clear-search');
  if(clearSearch) clearSearch.addEventListener('click', () => { state.inventoryFilters.query=''; render(); });

  root.querySelectorAll('[data-status]').forEach(el => {
    el.addEventListener('click', () => { state.inventoryFilters.status = el.dataset.status; render(); });
  });
  const filterLoc = document.getElementById('filter-loc');
  if(filterLoc) filterLoc.addEventListener('change', (e) => { state.inventoryFilters.loc = e.target.value; render(); });
  const filterCat = document.getElementById('filter-cat');
  if(filterCat) filterCat.addEventListener('change', (e) => { state.inventoryFilters.cat = e.target.value; render(); });

  // ---- Reports tab ----
  root.querySelectorAll('[data-period]').forEach(el => {
    el.addEventListener('click', () => { state.reportPeriod = Number(el.dataset.period); render(); });
  });

  // ---- Categories tab ----
  const addCatBtn = document.getElementById('btn-add-category');
  if(addCatBtn) addCatBtn.addEventListener('click', () => { state.categoryDraft = null; setState({ sheet:{ type:'categoryForm', payload:null } }); });
  root.querySelectorAll('[data-edit-cat]').forEach(el => {
    el.addEventListener('click', () => {
      const cat = state.data.categories.find(c => c.id === el.dataset.editCat);
      state.categoryDraft = null;
      setState({ sheet:{ type:'categoryForm', payload:cat } });
    });
  });
  root.querySelectorAll('[data-delete-cat]').forEach(el => {
    el.addEventListener('click', () => {
      const cat = state.data.categories.find(c => c.id === el.dataset.deleteCat);
      if(confirm(`¿Eliminar la categoría "${cat.name}"?`)) deleteCategory(cat.id);
    });
  });

  // ---- Sheet: close ----
  const overlay = document.getElementById('sheet-overlay');
  if(overlay) overlay.addEventListener('click', (e) => { if(e.target === overlay) closeSheet(); });
  const sheetClose = document.getElementById('sheet-close');
  if(sheetClose) sheetClose.addEventListener('click', closeSheet);

  // ---- Product form sheet ----
  const pfName = document.getElementById('pf-name');
  if(pfName){
    pfName.addEventListener('input', (e) => { state.productDraft.name = e.target.value; renderInPlace('pf-name'); });
    root.querySelectorAll('[data-pf-cat]').forEach(el => el.addEventListener('click', () => { state.productDraft.categoryId = el.dataset.pfCat; render(); }));
    root.querySelectorAll('[data-pf-loc]').forEach(el => el.addEventListener('click', () => { state.productDraft.locationId = el.dataset.pfLoc; render(); }));
    document.getElementById('pf-qty').addEventListener('input', (e) => { state.productDraft.qty = Number(e.target.value)||0; renderInPlace('pf-qty'); });
    document.getElementById('pf-unit').addEventListener('input', (e) => { state.productDraft.unit = e.target.value; renderInPlace('pf-unit'); });
    document.getElementById('pf-expiry').addEventListener('input', (e) => { state.productDraft.expiry = e.target.value; render(); });
    document.getElementById('pf-alert').addEventListener('input', (e) => { state.productDraft.alertDays = Number(e.target.value)||0; renderInPlace('pf-alert'); });
    const pfSave = document.getElementById('pf-save');
    if(pfSave) pfSave.addEventListener('click', () => {
      const d = state.productDraft;
      if(!d.name.trim() || !d.expiry || d.qty <= 0) return;
      const product = {
        id: uid(), name: d.name.trim(), categoryId: d.categoryId, locationId: d.locationId,
        unit: d.unit.trim()||'un.', alertDays: Number(d.alertDays),
        lots: [{ id: uid(), qty: Number(d.qty), expiry: d.expiry }],
      };
      addProduct(product);
      state.productDraft = null;
      closeSheet();
      showToast(`${product.name} agregado ✅`);
    });
  }

  // ---- Product detail sheet ----
  const pdAlert = document.getElementById('pd-alert');
  if(pdAlert) pdAlert.addEventListener('blur', (e) => {
    updateProduct(e.target.dataset.product, { alertDays: Number(e.target.value)||0 });
  });
  const pdAddLot = document.getElementById('pd-add-lot');
  if(pdAddLot) pdAddLot.addEventListener('click', () => { state.detailMode='addLot'; state.lotDraft=null; render(); });
  const pdConsume = document.getElementById('pd-consume');
  if(pdConsume) pdConsume.addEventListener('click', () => {
    state.detailMode='consume';
    state.consumeDraft = { lotId: null, amount: 1 };
    render();
  });
  const pdDelete = document.getElementById('pd-delete');
  if(pdDelete) pdDelete.addEventListener('click', () => {
    const product = state.data.products.find(p => p.id === state.sheet.payload.id);
    if(product && confirm(`¿Eliminar "${product.name}" y todos sus lotes?`)){
      deleteProduct(product.id);
      closeSheet();
      showToast('Producto eliminado');
    }
  });

  // ---- Add lot sheet ----
  const alMinus = document.getElementById('al-minus');
  if(alMinus) alMinus.addEventListener('click', () => { state.lotDraft.qty = Math.max(1, state.lotDraft.qty-1); render(); });
  const alPlus = document.getElementById('al-plus');
  if(alPlus) alPlus.addEventListener('click', () => { state.lotDraft.qty = state.lotDraft.qty+1; render(); });
  const alQty = document.getElementById('al-qty');
  if(alQty) alQty.addEventListener('input', (e) => { state.lotDraft.qty = Number(e.target.value)||1; renderInPlace('al-qty'); });
  const alExpiry = document.getElementById('al-expiry');
  if(alExpiry) alExpiry.addEventListener('input', (e) => { state.lotDraft.expiry = e.target.value; render(); });
  const alSave = document.getElementById('al-save');
  if(alSave) alSave.addEventListener('click', () => {
    const d = state.lotDraft;
    if(d.qty<=0 || !d.expiry) return;
    const productId = state.sheet.payload.id;
    addLot(productId, { id: uid(), qty: Number(d.qty), expiry: d.expiry });
    state.lotDraft = null;
    state.detailMode = 'view';
    const product = state.data.products.find(p => p.id === productId);
    state.sheet = { type:'productDetail', payload: product };
    render();
    showToast('Lote agregado ✅');
  });

  // ---- Consume sheet ----
  root.querySelectorAll('[data-pick-lot]').forEach(el => {
    el.addEventListener('click', () => { state.consumeDraft.lotId = el.dataset.pickLot; state.consumeDraft.amount = 1; render(); });
  });
  const csMinus = document.getElementById('cs-minus');
  if(csMinus) csMinus.addEventListener('click', () => { state.consumeDraft.amount = Math.max(1, state.consumeDraft.amount-1); render(); });
  const csPlus = document.getElementById('cs-plus');
  if(csPlus) csPlus.addEventListener('click', () => { state.consumeDraft.amount = state.consumeDraft.amount+1; render(); });
  const csAmount = document.getElementById('cs-amount');
  if(csAmount) csAmount.addEventListener('input', (e) => { state.consumeDraft.amount = Number(e.target.value)||1; renderInPlace('cs-amount'); });
  const csConfirm = document.getElementById('cs-confirm');
  if(csConfirm) csConfirm.addEventListener('click', () => {
    const lotId = csConfirm.dataset.lot;
    if(!lotId) return;
    const productId = state.sheet.payload.id;
    consumeLot(productId, lotId, state.consumeDraft.amount);
    state.detailMode = 'view';
    state.consumeDraft = { lotId:null, amount:1 };
    const product = state.data.products.find(p => p.id === productId);
    if(product){ state.sheet = { type:'productDetail', payload: product }; }
    else { state.sheet = null; }
    render();
    showToast('Stock descontado ✅');
  });

  // ---- Category form sheet ----
  const cfName = document.getElementById('cf-name');
  if(cfName){
    cfName.addEventListener('input', (e) => { state.categoryDraft.name = e.target.value; renderInPlace('cf-name'); });
    root.querySelectorAll('[data-cf-emoji]').forEach(el => el.addEventListener('click', () => { state.categoryDraft.emoji = el.dataset.cfEmoji; render(); }));
    root.querySelectorAll('[data-cf-color]').forEach(el => el.addEventListener('click', () => { state.categoryDraft.color = el.dataset.cfColor; render(); }));
    const cfSave = document.getElementById('cf-save');
    if(cfSave) cfSave.addEventListener('click', () => {
      const d = state.categoryDraft;
      if(!d.name.trim()) return;
      const editing = state.sheet.payload;
      if(editing) updateCategory(editing.id, { name:d.name.trim(), emoji:d.emoji, color:d.color });
      else addCategory({ id: uid(), name:d.name.trim(), emoji:d.emoji, color:d.color });
      state.categoryDraft = null;
      closeSheet();
    });
  }
}

// Helper: re-render but keep focus on a specific text input (avoids losing focus while typing)
function renderInPlace(focusId){
  const el = document.getElementById(focusId);
  const cursorPos = el ? el.selectionStart : null;
  render();
  const newEl = document.getElementById(focusId);
  if(newEl && cursorPos !== null){
    newEl.focus();
    try{ newEl.setSelectionRange(cursorPos, cursorPos); }catch(e){}
  }
}

function closeSheet(){
  state.sheet = null;
  state.detailMode = 'view';
  state.productDraft = null;
  state.categoryDraft = null;
  state.lotDraft = null;
  render();
}

// ---------- Boot ----------
render();

</script>
</body>
</html>
